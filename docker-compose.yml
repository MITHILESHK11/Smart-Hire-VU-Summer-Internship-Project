version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - shared-data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/resume_ranking.db
      - UPLOAD_DIR=/app/data/resumes
    restart: always

  frontend:
    # Build target is placeholder - full Dockerization happens in Phase 6
    image: node:18-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: npm run dev
    restart: always

volumes:
  shared-data:
